<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Recurso Genially</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0E2A33">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Genially">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root {
      --navy: #0E2A33;
      --teal: #127E89;
      --coral: #F0603A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
    }

    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: var(--navy);
      color: #fff;
      transition: opacity .4s ease;
      z-index: 10;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .ring {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(255,255,255,.18);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    #splash p { font-size: 14px; letter-spacing: .3px; color: #cfe0e3; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #installBtn {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      display: none;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--coral);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 400;
      border: 0;
      border-radius: 28px;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      cursor: pointer;
      z-index: 20;
    }
    #installBtn.show { display: inline-flex; }
    #installBtn svg { width: 18px; height: 18px; }

    #iosHint {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(14px + env(safe-area-inset-bottom, 0px));
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--teal);
      color: #fff;
      font-size: 14px;
      line-height: 1.35;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.28);
      z-index: 20;
    }
    #iosHint.show { display: flex; }
    #iosHint b { font-weight: 500; }
    #iosClose {
      margin-left: auto;
      flex: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
      color: #fff;
      border: 0;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="ring"></div>
    <p>Cargando recurso…</p>
  </div>

  <!-- PEGA ACA LA URL DE TU GENIALLY -->
  <iframe
    id="frame"
    src="https://view.genially.com/6a1efdd85bd741f200b39704"
    allowfullscreen
    allow="fullscreen; autoplay; encrypted-media"
    referrerpolicy="no-referrer-when-downgrade"
    onload="document.getElementById('splash').classList.add('hidden')">
  </iframe>

  <button id="installBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12"/><path d="M7 12l5 5 5-5"/><path d="M5 21h14"/>
    </svg>
    Instalar app
  </button>

  <div id="iosHint">
    <span>Para instalar: toc&aacute; <b>Compartir</b> y luego <b>&ldquo;Agregar a inicio&rdquo;</b>.</span>
    <button id="iosClose" type="button" aria-label="Cerrar">&times;</button>
  </div>

  <script>
    const installBtn = document.getElementById('installBtn');
    const iosHint = document.getElementById('iosHint');
    const iosClose = document.getElementById('iosClose');
    let deferredPrompt = null;

    const isStandalone =
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) installBtn.classList.add('show');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.remove('show');
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.remove('show');
      deferredPrompt = null;
    });

    const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent);
    if (isIOS && !isStandalone) iosHint.classList.add('show');
    iosClose.addEventListener('click', () => iosHint.classList.remove('show'));

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>

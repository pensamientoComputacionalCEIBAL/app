<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Recurso Genially</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0E2A33">

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Genially">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root {
      --navy: #0E2A33;
      --teal: #127E89;
      --coral: #F0603A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'Roboto', -apple-system, sans-serif;
    }
    #frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      background: var(--navy);
      color: #fff;
      transition: opacity .4s ease;
      z-index: 10;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .ring {
      width: 46px;
      height: 46px;
      border: 4px solid rgba(255,255,255,.18);
      border-top-color: var(--coral);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    #splash p { font-size: 14px; letter-spacing: .3px; color: #cfe0e3; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="ring"></div>
    <p>Cargando recurso…</p>
  </div>

  <!-- ▼▼▼ PEGÁ ACÁ LA URL DE TU GENIALLY (formato: https://view.genial.ly/XXXXXXXX) ▼▼▼ -->
  <iframe
    id="frame"
    src="https://view.genial.ly/TU_ID_DE_GENIALLY"
    allowfullscreen
    allow="fullscreen; autoplay; encrypted-media"
    referrerpolicy="no-referrer-when-downgrade"
    onload="document.getElementById('splash').classList.add('hidden')">
  </iframe>
  <!-- ▲▲▲ FIN URL ▲▲▲ -->

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
